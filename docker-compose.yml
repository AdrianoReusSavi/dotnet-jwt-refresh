services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=jwt_demo
      - POSTGRES_PASSWORD=jwt_demo
      - POSTGRES_DB=jwt_demo
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jwt_demo"]
      interval: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  api:
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Host=postgres;Database=jwt_demo;Username=jwt_demo;Password=jwt_demo
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: